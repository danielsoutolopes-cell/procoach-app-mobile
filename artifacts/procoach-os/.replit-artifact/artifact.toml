kind = "mobile"
previewPath = "/"
title = "PROCOACH OS V5.1"
version = "1.0.0"
id = "artifacts/procoach-os"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21276

[services.development]
run = "pnpm --filter @workspace/procoach-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/procoach-os", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/procoach-os", "run", "serve" ]

[services.env]
PORT = "21276"
BASE_PATH = "/"
